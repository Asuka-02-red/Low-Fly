spring:
  application:
    name: low-altitude-rest-stop-server
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/low_altitude_rest_stop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    redis:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  ratelimiter:
    instances:
      authApi:
        limitForPeriod: 20
        limitRefreshPeriod: 1s
        timeoutDuration: 0
  retry:
    instances:
      authTokenRefresh:
        maxAttempts: 3
        waitDuration: 200ms

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId=%X{requestId}] - %msg%n"

weather:
  amap:
    service-name: 实时天气
    realtime-key: ${AMAP_REALTIME_WEATHER_KEY:1c4f1fc1a4acc125d1c0aaff01f13ba9}
    cache-minutes: 15
