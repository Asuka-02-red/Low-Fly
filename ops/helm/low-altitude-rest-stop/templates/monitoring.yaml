{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: low-altitude-rest-stop
  namespace: {{ .Values.monitoring.serviceMonitorNamespace }}
spec:
  selector:
    matchLabels:
      app: low-altitude-rest-stop-server
  namespaceSelector:
    any: true
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: low-altitude-rest-stop-alerts
  namespace: {{ .Values.monitoring.serviceMonitorNamespace }}
spec:
  groups:
    - name: low-altitude-rest-stop
      rules:
        - alert: High5xxRate
          expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) > 1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: 后端 5xx 错误率过高
        - alert: HighLatencyP99
          expr: histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket[5m])) by (le)) > 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: 后端 P99 超过 500ms
{{- end }}
