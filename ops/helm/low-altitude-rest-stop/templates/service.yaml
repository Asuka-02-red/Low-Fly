apiVersion: v1
kind: Service
metadata:
  name: low-altitude-rest-stop-server
spec:
  selector:
    app: low-altitude-rest-stop-server
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: low-altitude-rest-stop-admin-web
spec:
  selector:
    app: low-altitude-rest-stop-admin-web
  ports:
    - name: http
      port: {{ .Values.adminWeb.service.port }}
      targetPort: 80
