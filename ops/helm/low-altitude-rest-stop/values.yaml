namespaceOverride: ""
image:
  registry: ghcr.io/example
  tag: latest
server:
  image:
    repository: low-altitude-server
  replicaCount: 2
  service:
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi
  env:
    SPRING_PROFILES_ACTIVE: docker
    DB_URL: jdbc:mysql://mysql:3306/low_altitude_rest_stop?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    DB_USERNAME: root
    DB_PASSWORD: change-me
    REDIS_HOST: redis
    REDIS_PORT: "6379"
adminWeb:
  image:
    repository: low-altitude-admin-web
  replicaCount: 2
  service:
    port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
ingress:
  enabled: true
  className: nginx
  host: low-altitude.example.com
monitoring:
  enabled: true
  serviceMonitorNamespace: monitoring
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
