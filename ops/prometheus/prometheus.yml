global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: low-altitude-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - server:8080
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
